<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="720" viewBox="0 0 1000 720" role="img" aria-labelledby="title desc">
<title id="title">Dry Run, Single Block, Override 관계</title>
<desc id="desc">초보자가 CNC 화면, 조작 순서, 장비 움직임을 함께 이해하도록 만든 교육용 도해</desc>
<defs>
  <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M1.5,1.5 L8,4.5 L1.5,7.5 Z" fill="#176f8f"/></marker>
  <marker id="arrow-red" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M1.5,1.5 L8,4.5 L1.5,7.5 Z" fill="#d64242"/></marker>
  <marker id="arrow-green" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M1.5,1.5 L8,4.5 L1.5,7.5 Z" fill="#25a55f"/></marker>
</defs>
<rect width="1000" height="720" fill="#ffffff"/>
<rect x="24" y="24" width="952" height="672" rx="20" fill="#ffffff" stroke="#d8dde6" stroke-width="3"/>
<text x="52" y="58" font-size="28" font-weight="800" fill="#0d4e67">Dry Run, Single Block, Override 관계</text>
<g>
<rect x="48" y="84" width="378" height="298" rx="18" fill="#263847" stroke="#0f1d28" stroke-width="5"/>
<rect x="70" y="124" width="334" height="220" rx="6" fill="#eff7fb" stroke="#111827" stroke-width="3"/>
<circle cx="105" cy="368" r="9" fill="#25a55f"/>
<circle cx="142" cy="368" r="9" fill="#e6a319"/>
<circle cx="179" cy="368" r="9" fill="#d64242"/>
<text x="72" y="104" font-size="20" font-weight="800" fill="#ffffff">CNC 화면 예시</text>
<rect x="72" y="146" width="330" height="34" rx="4" fill="#d9f1ff" stroke="#7ea6bd"/>
<text x="90" y="172" font-size="20" font-weight="800" fill="#102d3d">DRY RUN: ON</text>
<rect x="72" y="188" width="330" height="34" rx="4" fill="#ffffff" stroke="#7ea6bd"/>
<text x="90" y="214" font-size="18" font-weight="500" fill="#102d3d">SINGLE BLOCK: ON</text>
<rect x="72" y="230" width="330" height="34" rx="4" fill="#ffffff" stroke="#7ea6bd"/>
<text x="90" y="256" font-size="18" font-weight="500" fill="#102d3d">FEED OVR: 10%</text>
<rect x="72" y="272" width="330" height="34" rx="4" fill="#ffffff" stroke="#7ea6bd"/>
<text x="90" y="298" font-size="18" font-weight="500" fill="#102d3d">BLOCK: N120</text>
</g>
<g transform="translate(500 94)">
<text x="0" y="10" font-size="20" font-weight="800" fill="#0d4e67">동작/구조 설명</text>
<rect x="0" y="58" width="350" height="230" rx="16" fill="#f8fafc" stroke="#b8c4d2" stroke-width="3"/>
<rect x="36" y="86" width="278" height="158" rx="8" fill="#111827" stroke="#334155" stroke-width="4"/>
<text x="58" y="124" font-size="22" font-weight="800" fill="#d9f1ff">한 블록 실행</text>
<text x="58" y="164" font-size="20" font-weight="700" fill="#ffffff">SINGLE BLOCK ON</text>
<text x="58" y="204" font-size="20" font-weight="700" fill="#f2c14e">Cycle Start 전 확인</text>
<rect x="62" y="262" width="94" height="34" rx="8" fill="#25a55f"/><text x="82" y="286" font-size="17" font-weight="800" fill="#ffffff">START</text>
<rect x="174" y="262" width="94" height="34" rx="8" fill="#d64242"/><text x="199" y="286" font-size="17" font-weight="800" fill="#ffffff">STOP</text>
</g>
<text x="54" y="492" font-size="22" font-weight="800" fill="#0d4e67">학습 순서</text>
<rect x="54" y="522" width="376" height="52" rx="10" fill="#eef3f8" stroke="#b8c4d2"/>
<circle cx="82" cy="546" r="15" fill="#176f8f"/>
<text x="77" y="553" font-size="18" font-weight="800" fill="#ffffff">1</text>
<text x="110" y="547" font-size="16" font-weight="700" fill="#163247">
<tspan x="110" dy="0">Dry Run 켜기</tspan>
</text>
<rect x="470" y="522" width="376" height="52" rx="10" fill="#eef3f8" stroke="#b8c4d2"/>
<circle cx="498" cy="546" r="15" fill="#176f8f"/>
<text x="493" y="553" font-size="18" font-weight="800" fill="#ffffff">2</text>
<text x="526" y="547" font-size="16" font-weight="700" fill="#163247">
<tspan x="526" dy="0">Single Block 켜기</tspan>
</text>
<rect x="54" y="590" width="376" height="52" rx="10" fill="#eef3f8" stroke="#b8c4d2"/>
<circle cx="82" cy="614" r="15" fill="#176f8f"/>
<text x="77" y="621" font-size="18" font-weight="800" fill="#ffffff">3</text>
<text x="110" y="615" font-size="16" font-weight="700" fill="#163247">
<tspan x="110" dy="0">Override 낮추기</tspan>
</text>
<rect x="470" y="590" width="376" height="52" rx="10" fill="#eef3f8" stroke="#b8c4d2"/>
<circle cx="498" cy="614" r="15" fill="#176f8f"/>
<text x="493" y="621" font-size="18" font-weight="800" fill="#ffffff">4</text>
<text x="526" y="615" font-size="16" font-weight="700" fill="#163247">
<tspan x="526" dy="0">한 블록 실행 후 관찰</tspan>
</text>
</svg>
