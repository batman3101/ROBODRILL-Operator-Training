<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="720" viewBox="0 0 1000 720" role="img" aria-labelledby="title desc">
<title id="title">절삭유 방향과 칩 배출 확인</title>
<desc id="desc">초보자가 CNC 화면, 조작 순서, 장비 움직임을 함께 이해하도록 만든 교육용 도해</desc>
<defs>
  <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#176f8f"/></marker>
  <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#d64242"/></marker>
  <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#25a55f"/></marker>
</defs>
<rect width="1000" height="720" fill="#ffffff"/>
<rect x="24" y="24" width="952" height="672" rx="20" fill="#ffffff" stroke="#d8dde6" stroke-width="3"/>
<text x="52" y="58" font-size="28" font-weight="800" fill="#0d4e67">절삭유 방향과 칩 배출 확인</text>
<g>
<rect x="48" y="84" width="378" height="298" rx="18" fill="#263847" stroke="#0f1d28" stroke-width="5"/>
<rect x="70" y="124" width="334" height="220" rx="6" fill="#eff7fb" stroke="#111827" stroke-width="3"/>
<circle cx="105" cy="368" r="9" fill="#25a55f"/>
<circle cx="142" cy="368" r="9" fill="#e6a319"/>
<circle cx="179" cy="368" r="9" fill="#d64242"/>
<text x="72" y="104" font-size="20" font-weight="800" fill="#ffffff">CNC 화면 예시</text>
<rect x="72" y="146" width="330" height="34" rx="4" fill="#d9f1ff" stroke="#7ea6bd"/>
<text x="90" y="172" font-size="20" font-weight="800" fill="#102d3d">COOLANT: ON</text>
<rect x="72" y="188" width="330" height="34" rx="4" fill="#ffffff" stroke="#7ea6bd"/>
<text x="90" y="214" font-size="18" font-weight="500" fill="#102d3d">FLOW: OK</text>
<rect x="72" y="230" width="330" height="34" rx="4" fill="#ffffff" stroke="#7ea6bd"/>
<text x="90" y="256" font-size="18" font-weight="500" fill="#102d3d">CHIP AREA: CHECK</text>
<rect x="72" y="272" width="330" height="34" rx="4" fill="#ffffff" stroke="#7ea6bd"/>
<text x="90" y="298" font-size="18" font-weight="500" fill="#102d3d">DOOR: CLOSED</text>
</g>
<g transform="translate(500 94)">
<text x="0" y="10" font-size="20" font-weight="800" fill="#0d4e67">동작/구조 설명</text>
<rect x="0" y="58" width="350" height="230" rx="16" fill="#f8fafc" stroke="#b8c4d2" stroke-width="3"/>
<rect x="72" y="94" width="202" height="138" rx="8" fill="#e2e8f0" stroke="#64748b" stroke-width="4"/>
<rect x="116" y="132" width="114" height="74" fill="#f2c14e" stroke="#7a5a0a" stroke-width="4"/>
<path d="M58 92 C100 100 126 118 154 150" fill="none" stroke="#176f8f" stroke-width="8" marker-end="url(#arrow-blue)"/>




<text x="42" y="270" font-size="20" font-weight="800" fill="#163247">노즐은 공구 끝을 향하게</text>
</g>
<text x="54" y="492" font-size="22" font-weight="800" fill="#0d4e67">학습 순서</text>
<rect x="54" y="522" width="376" height="48" rx="10" fill="#eef3f8" stroke="#b8c4d2"/>
<circle cx="82" cy="546" r="15" fill="#176f8f"/>
<text x="77" y="553" font-size="18" font-weight="800" fill="#ffffff">1</text>
<text x="110" y="553" font-size="18" font-weight="700" fill="#163247">노즐 방향을 공구 끝에 맞춤</text>
<rect x="470" y="522" width="376" height="48" rx="10" fill="#eef3f8" stroke="#b8c4d2"/>
<circle cx="498" cy="546" r="15" fill="#176f8f"/>
<text x="493" y="553" font-size="18" font-weight="800" fill="#ffffff">2</text>
<text x="526" y="553" font-size="18" font-weight="700" fill="#163247">절삭유 흐름 확인</text>
<rect x="54" y="590" width="376" height="48" rx="10" fill="#eef3f8" stroke="#b8c4d2"/>
<circle cx="82" cy="614" r="15" fill="#176f8f"/>
<text x="77" y="621" font-size="18" font-weight="800" fill="#ffffff">3</text>
<text x="110" y="621" font-size="18" font-weight="700" fill="#163247">칩 쌓임 확인</text>
<rect x="470" y="590" width="376" height="48" rx="10" fill="#eef3f8" stroke="#b8c4d2"/>
<circle cx="498" cy="614" r="15" fill="#176f8f"/>
<text x="493" y="621" font-size="18" font-weight="800" fill="#ffffff">4</text>
<text x="526" y="621" font-size="18" font-weight="700" fill="#163247">문 닫힘 후 운전</text>
</svg>
