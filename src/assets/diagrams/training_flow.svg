<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">초보자 가공 전 점검 흐름</title>
  <desc id="desc">안전 확인부터 기록 검토까지 초보자 교육에서 반복할 기본 점검 흐름</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto">
      <path d="M1.5,1.5 L8.5,5 L1.5,8.5 Z" fill="#176f8f"/>
    </marker>
  </defs>
  <rect width="900" height="520" fill="#f8fafc"/>
  <rect x="34" y="34" width="832" height="452" rx="18" fill="#ffffff" stroke="#d8dde6" stroke-width="3"/>
  <text x="64" y="78" fill="#0d4e67" font-family="Arial, Malgun Gothic, sans-serif" font-size="30" font-weight="800">초보자 기본 운전 흐름</text>

  <g fill="#ffffff" stroke="#176f8f" stroke-width="4">
    <rect x="72" y="112" width="158" height="82" rx="10"/>
    <rect x="282" y="112" width="158" height="82" rx="10"/>
    <rect x="492" y="112" width="158" height="82" rx="10"/>
    <rect x="282" y="252" width="158" height="82" rx="10"/>
    <rect x="492" y="252" width="158" height="82" rx="10"/>
    <rect x="282" y="392" width="368" height="68" rx="10"/>
  </g>

  <g fill="#0d4e67" font-family="Arial, Malgun Gothic, sans-serif" font-weight="800" text-anchor="middle">
    <text x="151" y="144" font-size="24">1</text>
    <text x="151" y="174" font-size="23">안전 확인</text>
    <text x="361" y="144" font-size="24">2</text>
    <text x="361" y="174" font-size="23">전원 투입</text>
    <text x="571" y="144" font-size="24">3</text>
    <text x="571" y="174" font-size="23">원점복귀</text>
    <text x="361" y="284" font-size="24">4</text>
    <text x="361" y="314" font-size="23">공구/좌표</text>
    <text x="571" y="284" font-size="24">5</text>
    <text x="571" y="314" font-size="23">Dry Run</text>
    <text x="466" y="434" font-size="23">6  기록 및 검토</text>
  </g>

  <g stroke="#176f8f" stroke-width="5" fill="none" marker-end="url(#arrow)">
    <line x1="230" y1="153" x2="274" y2="153"/>
    <line x1="440" y1="153" x2="484" y2="153"/>
    <path d="M571 194 C571 230 361 218 361 244"/>
    <line x1="440" y1="293" x2="484" y2="293"/>
    <path d="M571 334 C571 370 466 360 466 384"/>
  </g>
</svg>
