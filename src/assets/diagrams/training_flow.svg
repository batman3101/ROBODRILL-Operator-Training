  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#176f8f"/>
    </marker>
  </defs>
  <g font-family="Arial, sans-serif">
    <g fill="#ffffff" stroke="#176f8f" stroke-width="4">
      <rect x="56" y="82" width="170" height="92" rx="10"/>
      <rect x="282" y="82" width="170" height="92" rx="10"/>
      <rect x="508" y="82" width="170" height="92" rx="10"/>
      <rect x="282" y="250" width="170" height="92" rx="10"/>
      <rect x="508" y="250" width="170" height="92" rx="10"/>
      <rect x="282" y="398" width="396" height="72" rx="10"/>
