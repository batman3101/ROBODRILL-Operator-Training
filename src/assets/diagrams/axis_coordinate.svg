<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Machine coordinate axes</title>
  <desc id="desc">Basic X Y Z axis directions for a vertical machining center.</desc>
  <rect width="900" height="520" fill="#ffffff"/>
  <rect x="240" y="300" width="350" height="78" rx="8" fill="#dbe5ef" stroke="#6b7785" stroke-width="4"/>
  <rect x="352" y="170" width="118" height="132" rx="8" fill="#f2c14e" stroke="#7a5a0a" stroke-width="4"/>
  <line x1="415" y1="300" x2="415" y2="95" stroke="#176f8f" stroke-width="9" stroke-linecap="round"/>
  <polygon points="415,60 392,105 438,105" fill="#176f8f"/>
  <text x="440" y="92" fill="#176f8f" font-family="Arial, sans-serif" font-size="34" font-weight="700">+Z</text>
  <line x1="415" y1="342" x2="690" y2="342" stroke="#3b936a" stroke-width="9" stroke-linecap="round"/>
  <polygon points="730,342 682,318 682,366" fill="#3b936a"/>
  <text x="718" y="315" fill="#3b936a" font-family="Arial, sans-serif" font-size="34" font-weight="700">+X</text>
  <line x1="415" y1="342" x2="248" y2="438" stroke="#c05621" stroke-width="9" stroke-linecap="round"/>
  <polygon points="213,459 242,417 265,456" fill="#c05621"/>
  <text x="190" y="436" fill="#c05621" font-family="Arial, sans-serif" font-size="34" font-weight="700">+Y</text>
  <circle cx="415" cy="342" r="12" fill="#111827"/>
  <text x="415" y="432" fill="#475569" font-family="Arial, sans-serif" font-size="25" text-anchor="middle">Programmer view: check the machine-specific axis label before jogging.</text>
</svg>
