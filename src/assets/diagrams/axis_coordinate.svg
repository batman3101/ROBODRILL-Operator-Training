<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">기계 축 방향 확인 도해</title>
  <desc id="desc">JOG와 HANDLE 이동 전 X, Y, Z 축 방향과 장비 축 표기를 확인하는 교육용 도해</desc>
  <defs>
    <marker id="arrow-z" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto">
      <path d="M1.5,1.5 L8.5,5 L1.5,8.5 Z" fill="#176f8f"/>
    </marker>
    <marker id="arrow-x" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto">
      <path d="M1.5,1.5 L8.5,5 L1.5,8.5 Z" fill="#3b936a"/>
    </marker>
    <marker id="arrow-y" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto">
      <path d="M1.5,1.5 L8.5,5 L1.5,8.5 Z" fill="#c05621"/>
    </marker>
  </defs>
  <rect width="900" height="520" fill="#ffffff"/>
  <rect x="34" y="34" width="832" height="452" rx="18" fill="#ffffff" stroke="#d8dde6" stroke-width="3"/>
  <text x="64" y="78" fill="#0d4e67" font-family="Arial, Malgun Gothic, sans-serif" font-size="30" font-weight="800">JOG / HANDLE 이동 전 축 방향 확인</text>

  <rect x="230" y="304" width="384" height="76" rx="10" fill="#dbe5ef" stroke="#6b7785" stroke-width="4"/>
  <rect x="360" y="178" width="112" height="126" rx="8" fill="#f2c14e" stroke="#7a5a0a" stroke-width="4"/>
  <rect x="390" y="128" width="52" height="52" rx="4" fill="#cbd5e1" stroke="#64748b" stroke-width="3"/>
  <circle cx="416" cy="342" r="11" fill="#111827"/>

  <line x1="416" y1="342" x2="416" y2="116" stroke="#176f8f" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow-z)"/>
  <text x="438" y="128" fill="#176f8f" font-family="Arial, Malgun Gothic, sans-serif" font-size="30" font-weight="800">+Z</text>
  <text x="438" y="160" fill="#176f8f" font-family="Arial, Malgun Gothic, sans-serif" font-size="20" font-weight="700">주축 상향</text>

  <line x1="416" y1="342" x2="692" y2="342" stroke="#3b936a" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow-x)"/>
  <text x="690" y="316" fill="#3b936a" font-family="Arial, Malgun Gothic, sans-serif" font-size="30" font-weight="800">+X</text>
  <text x="640" y="386" fill="#3b936a" font-family="Arial, Malgun Gothic, sans-serif" font-size="20" font-weight="700">좌우 이동</text>

  <line x1="416" y1="342" x2="270" y2="426" stroke="#c05621" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow-y)"/>
  <text x="228" y="418" fill="#c05621" font-family="Arial, Malgun Gothic, sans-serif" font-size="30" font-weight="800">+Y</text>
  <text x="218" y="444" fill="#c05621" font-family="Arial, Malgun Gothic, sans-serif" font-size="20" font-weight="700">전후 이동</text>

  <rect x="320" y="420" width="370" height="42" rx="8" fill="#eef8f3" stroke="#9bc7af"/>
  <text x="505" y="447" fill="#163247" font-family="Arial, Malgun Gothic, sans-serif" font-size="18" font-weight="700" text-anchor="middle">축 선택 후 화면 좌표와 실제 이동 방향 확인</text>
</svg>
